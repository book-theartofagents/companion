# Guardrails for the Spec Loop harness.
# These rules turn the feedback loop into a policy. Without them the
# measurement is a vibe with a number attached.

rules:
  - name: golden-dataset-present
    type: file
    path: ./golden-dataset.csv
    action: enforce
    message: "No dataset, no number. Running blind is the first anti-pattern in Ch. 13."

  - name: metric-threshold
    type: metric
    key: answer_correctness
    min: 0.70
    action: reject
    message: "Answer-correctness below 0.70. Do not ship. Surface failures, propose deltas."

  - name: faithfulness-threshold
    type: metric
    key: faithfulness
    min: 0.80
    action: reject
    message: "Faithfulness below 0.80. The agent is drifting from the retrieved context."

  - name: dataset-freshness
    type: metadata
    key: dataset_updated_days_ago
    condition: "> 90"
    action: warn
    message: "Golden dataset not updated in 90 days. See Ch. 13 one-off evaluation anti-pattern."

  - name: judge-calibration-required
    type: metadata
    key: judge_calibrated_against_humans
    condition: "!= true"
    action: warn
    message: "Judge has never been calibrated against humans. See Ch. 13 confident stranger."

  - name: delta-on-failure
    type: schema
    schema:
      type: object
      required: [scenario_id, failure_reason, proposed_delta]
      properties:
        scenario_id: {type: string, pattern: "^SCN-[0-9]+$"}
        failure_reason: {type: string, minLength: 8}
        proposed_delta: {type: string, minLength: 16}
    action: enforce
    message: "Failures must yield structured deltas, not prose bug reports."

  - name: regression-on-every-change
    type: ci
    step: regression_suite
    when: [on_commit, nightly]
    action: enforce
    message: "Regression suite runs on every change. Drift is continuous."

general_settings:
  dspy_version: "3.1.3"
  ragas_version: "0.4.3"
  metric_source: offline_deterministic
  commons_write: learnings
